<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>You Can Find Us Wherever You Are · Urge</title>
  <style>
    /*
      Figma: Urge · node 110:30
      "ChatGPT Image Jul 15, 2026…" — full-bleed presentation slide (≈1920×1080)
    */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #1a1510;
      color: #f5efe3;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    .slide {
      position: relative;
      width: min(100vw, calc(100vh * 1920 / 1080));
      height: min(100vh, calc(100vw * 1080 / 1920));
      max-width: 100%;
      aspect-ratio: 1920 / 1080;
      overflow: hidden;
      background: #c4a882;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }

    /* On phones: fill screen, crop edges if needed */
    @media (max-width: 700px), (max-height: 500px) {
      body { align-items: stretch; justify-content: stretch; }
      .slide {
        width: 100%;
        height: 100dvh;
        max-width: none;
        aspect-ratio: auto;
        box-shadow: none;
      }
    }

    .slide img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 55%;
      display: block;
    }

    /* Screen-reader / SEO text (visual is in the image per Figma) */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- Figma node 110:30 — pixel-matched full-frame image -->
  <main class="slide" role="img" aria-labelledby="slide-title" aria-describedby="slide-desc">
    <img
      src="./assets/figma-110-30/slide.jpg"
      alt="Urge product packaging: Immunity, Focus, Electrolyte, and pocket kit on a shelf"
      width="1920"
      height="1080"
    />
    <h1 id="slide-title" class="sr-only">You Can Find Us Wherever You Are</h1>
    <p id="slide-desc" class="sr-only">
      This year you can buy Urge lollipops at in-person events, Amazon, TikTok Shop,
      and monthly subscription at tasteurge.com. Electrolyte, anti-stress, immunity,
      and focus formats.
    </p>
  </main>
</body>
</html>
